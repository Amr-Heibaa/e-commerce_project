<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Checkout | Perfume Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20">
    <a href="/index.html" class="text-2xl font-serif gold-text">Perfume Store</a>

    <nav class="hidden md:flex gap-8 text-sm uppercase tracking-widest">
        <a href="/index.html" class="hover:text-yellow-400">Home</a>
        <a href="/products.html" class="hover:text-yellow-400">Products</a>
        <a href="/cart.html" class="hover:text-yellow-400">Cart</a>
        <a href="/my-orders.html" class="hover:text-yellow-400">My Orders</a>
    </nav>

    <div id="authLinks" class="text-sm"></div>
</header>

<main class="px-8 py-12">
    <div class="mb-10">
        <p class="gold-text uppercase tracking-[0.3em] text-sm mb-3">Secure Checkout</p>
        <h1 class="text-5xl font-serif">Complete Your Order</h1>
    </div>

    <div id="checkoutMessage" class="hidden mb-6 rounded-xl px-4 py-3 text-sm"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <form onsubmit="placeOrder(event)" class="lg:col-span-2 glass-card rounded-3xl p-6 space-y-5">
            <h2 class="text-2xl font-serif gold-text mb-4">Shipping Address</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm mb-2 text-gray-300">Full Name</label>
                    <input name="fullName" required class="input-luxury w-full rounded-xl px-4 py-3" />
                </div>

                <div>
                    <label class="block text-sm mb-2 text-gray-300">Phone</label>
                    <input name="phone" required class="input-luxury w-full rounded-xl px-4 py-3" />
                </div>
            </div>

            <div>
                <label class="block text-sm mb-2 text-gray-300">Address Line 1</label>
                <input name="addressLine1" required class="input-luxury w-full rounded-xl px-4 py-3" />
            </div>

            <div>
                <label class="block text-sm mb-2 text-gray-300">Address Line 2</label>
                <input name="addressLine2" class="input-luxury w-full rounded-xl px-4 py-3" />
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div>
                    <label class="block text-sm mb-2 text-gray-300">City</label>
                    <input name="city" required class="input-luxury w-full rounded-xl px-4 py-3" />
                </div>

                <div>
                    <label class="block text-sm mb-2 text-gray-300">State</label>
                    <input name="state" required class="input-luxury w-full rounded-xl px-4 py-3" />
                </div>

                <div>
                    <label class="block text-sm mb-2 text-gray-300">Postal Code</label>
                    <input name="postalCode" required class="input-luxury w-full rounded-xl px-4 py-3" />
                </div>
            </div>

            <div>
                <label class="block text-sm mb-2 text-gray-300">Country</label>
                <input name="country" value="Egypt" required class="input-luxury w-full rounded-xl px-4 py-3" />
            </div>

            <h2 class="text-2xl font-serif gold-text pt-6 mb-4">Payment</h2>

            <select name="paymentMethod" required class="input-luxury w-full rounded-xl px-4 py-3">
                <option value="CASH_ON_DELIVERY">Cash On Delivery</option>
                <option value="CREDIT_CARD">Credit Card</option>
            </select>

            <button class="gold-btn rounded-xl px-8 py-3 w-full">
                Place Order
            </button>
        </form>

        <aside class="glass-card rounded-3xl p-6 h-fit">
            <h2 class="text-2xl font-serif gold-text mb-6">Cart Summary</h2>
            <div id="checkoutSummary" class="space-y-4"></div>

            <div class="border-t border-yellow-500/20 my-5"></div>

            <div class="flex justify-between text-xl font-semibold">
                <span>Total</span>
                <span class="gold-text" id="checkoutTotal">$0.00</span>
            </div>
        </aside>
    </div>
</main>

<!-- checkout.html -->
<script src="/js/api.js"></script>
<script src="/js/products.js"></script>
<script src="/js/cart.js"></script>
<script>
    requireCartAuth();
    renderAuthLinks();
    loadCheckoutSummary();
</script>

</body>
</html>
