<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Admin Products | Perfume Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20">
    <a href="/admin-dashboard.html" class="text-2xl font-serif gold-text">Perfume Admin</a>

    <nav class="hidden md:flex gap-6 text-sm uppercase tracking-widest">
        <a href="/admin-dashboard.html" class="hover:text-yellow-400">Dashboard</a>
        <a href="/admin-categories.html" class="hover:text-yellow-400">Categories</a>
        <a href="/admin-products.html" class="gold-text">Products</a>
        <a href="/admin-orders.html" class="hover:text-yellow-400">Orders</a>
        <a href="/admin-users.html" class="hover:text-yellow-400">Users</a>
        <a href="/admin-refunds.html" class="hover:text-yellow-400">Refunds</a>
    </nav>

    <button onclick="api.logout()" class="gold-text text-sm">Logout</button>
</header>

<main class="px-8 py-12">
    <div class="mb-10">
        <p class="gold-text uppercase tracking-[0.3em] text-sm mb-3">Catalog</p>
        <h1 class="text-5xl font-serif">Manage Products</h1>
    </div>

    <div id="productMessage" class="hidden mb-6 rounded-xl px-4 py-3 text-sm"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <form onsubmit="saveAdminProduct(event)" class="glass-card rounded-3xl p-6 h-fit">
            <h2 id="productFormTitle" class="text-2xl font-serif gold-text mb-6">Add Product</h2>

            <input type="hidden" name="productId" />

            <div class="mb-5">
                <label class="block text-sm mb-2 text-gray-300">Product Name</label>
                <input name="name" required class="input-luxury w-full rounded-xl px-4 py-3" />
            </div>

            <div class="mb-5">
                <label class="block text-sm mb-2 text-gray-300">Description</label>
                <textarea name="description" rows="4" class="input-luxury w-full rounded-xl px-4 py-3"></textarea>
            </div>

            <div class="mb-5">
                <label class="block text-sm mb-2 text-gray-300">Fragrance Family</label>
                <select name="fragranceFamily" required class="input-luxury w-full rounded-xl px-4 py-3">
                    <option value="">Select Family</option>
                    <option value="FLORAL">FLORAL</option>
                    <option value="WOODY">WOODY</option>
                    <option value="ORIENTAL">ORIENTAL</option>
                    <option value="FRESH">FRESH</option>
                    <option value="CITRUS">CITRUS</option>
                    <option value="SPICY">SPICY</option>
                    <option value="AQUATIC">AQUATIC</option>
                    <option value="GOURMAND">GOURMAND</option>
                </select>
            </div>

            <div class="mb-5">
                <label class="block text-sm mb-2 text-gray-300">Category</label>
                <select id="productCategorySelect" name="categoryId" required class="input-luxury w-full rounded-xl px-4 py-3">
                    <option value="">Loading categories...</option>
                </select>
            </div>

            <div class="mb-5">
                <label class="flex items-center gap-3 text-sm text-gray-300">
                    <input type="checkbox" name="active" checked />
                    Active product
                </label>
            </div>

            <button class="gold-btn w-full rounded-xl py-3 mb-3">
                Save Product
            </button>

            <button type="button" onclick="resetProductForm()" class="outline-gold w-full rounded-xl py-3">
                Clear
            </button>
        </form>

        <section class="lg:col-span-2 glass-card rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-serif gold-text">Products</h2>
                <button onclick="loadAdminProducts()" class="outline-gold rounded-xl px-4 py-2">Refresh</button>
            </div>

            <div id="adminProductsTable" class="space-y-4"></div>
        </section>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
<script>
    requireAdminPage();
    loadProductFormData();
    loadAdminProducts();
</script>

</body>
</html>
