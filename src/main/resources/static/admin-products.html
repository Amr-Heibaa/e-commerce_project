<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Products | Perfume Store</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />

    <style>
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(14px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .fade-up { animation:fadeUp .45s ease both; }

        .admin-input{
            width:100%;
            background:rgba(255,255,255,.03);
            border:1px solid rgba(202,138,4,.18);
            border-radius:14px;
            padding:14px 16px;
            color:#fff;
            outline:none;
            transition:.2s;
        }

        .admin-input:focus{
            border-color:#ca8a04;
            box-shadow:0 0 0 3px rgba(202,138,4,.15);
        }

        .variant-card{
            border:1px solid rgba(202,138,4,.12);
            border-radius:18px;
            padding:18px;
            background:rgba(255,255,255,.02);
        }

        .inventory-log{
            border-left:2px solid rgba(202,138,4,.4);
            padding-left:12px;
        }
    </style>
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20 sticky top-0 z-50 backdrop-blur-md bg-black/80">

    <a href="/admin-dashboard.html"
       class="text-2xl font-serif gold-text tracking-wide">
        Perfume Admin
    </a>

    <nav class="hidden md:flex gap-6 text-xs uppercase tracking-widest">
        <a href="/admin-dashboard.html">Dashboard</a>
        <a href="/admin-categories.html">Categories</a>
        <a href="/admin-products.html" class="gold-text border-b border-yellow-500 pb-1">Products</a>
        <a href="/admin-orders.html">Orders</a>
        <a href="/admin-users.html">Users</a>
        <a href="/admin-refunds.html">Refunds</a>
    </nav>

    <button onclick="api.logout()"
            class="gold-text text-xs uppercase tracking-widest">
        Logout
    </button>

</header>

<main class="max-w-screen-2xl mx-auto px-6 md:px-10 py-12">

    <div class="mb-10 fade-up">
        <p class="gold-text uppercase tracking-[0.35em] text-xs mb-3">
            Catalog
        </p>

        <h1 class="text-5xl font-serif">
            Manage Products
        </h1>
    </div>

    <div id="productMessage"
         class="hidden mb-6 rounded-xl px-4 py-3 text-sm"></div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">

        <!-- PRODUCT FORM -->

        <section class="glass-card rounded-3xl p-7 h-fit fade-up">

            <h2 id="productFormTitle"
                class="text-2xl font-serif gold-text mb-6">
                Add Product
            </h2>

            <form onsubmit="saveAdminProduct(event)"
                  id="adminProductForm">

                <input type="hidden" name="productId" />

                <div class="mb-5">
                    <label class="block mb-2 text-xs uppercase tracking-widest text-gray-400">
                        Product Name
                    </label>

                    <input name="name"
                           required
                           class="admin-input"
                           placeholder="e.g. Oud Noir" />
                </div>

                <div class="mb-5">
                    <label class="block mb-2 text-xs uppercase tracking-widest text-gray-400">
                        Description
                    </label>

                    <textarea name="description"
                              rows="4"
                              class="admin-input resize-none"
                              placeholder="Luxury fragrance description..."></textarea>
                </div>

                <div class="mb-5">
                    <label class="block mb-2 text-xs uppercase tracking-widest text-gray-400">
                        Fragrance Family
                    </label>

                    <select name="fragranceFamily"
                            required
                            class="admin-input">


                        <option value="">Select</option>

                        <option value="WOODY">Woody</option>
                        <option value="FRESH">Fresh</option>
                        <option value="CITRUS">Citrus</option>
                        <option value="FRUITY">Fruity</option>
                        <option value="AQUATIC">Aquatic</option>
                        <option value="SPICY">Spicy</option>
                        <option value="LEATHER">Leather</option>
                        <option value="AROMATIC">Aromatic</option>
                    </select>
                </div>

                <div class="mb-5">
                    <label class="block mb-2 text-xs uppercase tracking-widest text-gray-400">
                        Category
                    </label>

                    <select id="productCategorySelect"
                            name="categoryId"
                            required
                            class="admin-input">
                    </select>
                </div>

                <div class="mb-6">
                    <label class="flex items-center gap-3">
                        <input type="checkbox"
                               name="active"
                               checked
                               class="accent-yellow-500">

                        <span class="text-sm text-gray-300">
                            Active Product
                        </span>
                    </label>
                </div>

                <button type="submit" class="gold-btn w-full rounded-xl py-3 mb-3">
                    Save Product
                </button>

                <button type="button"
                        onclick="resetProductForm()"
                        class="outline-gold w-full rounded-xl py-3 text-sm">
                    Clear Form
                </button>

            </form>
        </section>

        <!-- PRODUCTS -->

        <section class="xl:col-span-2 glass-card rounded-3xl p-7 fade-up">

            <div class="flex justify-between items-center mb-8">

                <h2 class="text-2xl font-serif gold-text">
                    Products
                </h2>

                <button onclick="loadAdminProducts()"
                        class="outline-gold rounded-xl px-4 py-2 text-sm">
                    Refresh
                </button>
            </div>

            <div id="adminProductsTable"
                 class="space-y-5">
            </div>

        </section>

    </div>

</main>

<div id="variantModal" class="admin-modal-overlay" aria-hidden="true">
    <form id="variantModalForm" class="admin-modal-card">
        <p class="admin-modal-title">
            Add Variant
        </p>

        <p class="admin-modal-copy">
            Add a size, price, and starting stock for this product.
        </p>

        <input type="hidden" name="productId" />

        <label class="admin-modal-field">
            <span class="admin-modal-label">Size</span>
            <input name="size"
                   required
                   placeholder="e.g. 50ML"
                   class="admin-modal-input" />
        </label>

        <label class="admin-modal-field">
            <span class="admin-modal-label">Price</span>
            <input name="price"
                   type="number"
                   min="0.01"
                   step="0.01"
                   required
                   placeholder="80.00"
                   class="admin-modal-input" />
        </label>

        <label class="admin-modal-field admin-modal-field-last">
            <span class="admin-modal-label">Initial Stock</span>
            <input name="stockQuantity"
                   type="number"
                   min="0"
                   step="1"
                   required
                   placeholder="20"
                   class="admin-modal-input" />
        </label>

        <div class="admin-modal-actions">
            <button type="button"
                    id="variantCancel"
                    class="admin-modal-cancel">
                Cancel
            </button>

            <button type="submit"
                    class="admin-modal-submit">
                Save Variant
            </button>
        </div>
    </form>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/admin-products-management.js"></script>
<script>
    requireAdminPage();
    loadProductFormData();
    loadAdminProducts();
</script>
</body>
</html>
