<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Products | Perfume Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up   { animation: fadeUp .45s ease both; }
        .fade-up-1 { animation-delay: .05s; }
        .fade-up-2 { animation-delay: .12s; }
    </style>
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20 sticky top-0 z-50 backdrop-blur-md bg-black/80">
    <a href="/admin-dashboard.html" class="text-2xl font-serif gold-text tracking-wide">Perfume Admin</a>

    <nav class="hidden md:flex gap-6 text-xs uppercase tracking-widest">
        <a href="/admin-dashboard.html" class="hover:text-yellow-400 transition-colors">Dashboard</a>
        <a href="/admin-categories.html" class="hover:text-yellow-400 transition-colors">Categories</a>
        <a href="/admin-products.html"   class="gold-text border-b border-yellow-500 pb-0.5">Products</a>
        <a href="/admin-orders.html"     class="hover:text-yellow-400 transition-colors">Orders</a>
        <a href="/admin-users.html"      class="hover:text-yellow-400 transition-colors">Users</a>
        <a href="/admin-refunds.html"    class="hover:text-yellow-400 transition-colors">Refunds</a>
    </nav>

    <button onclick="logout()" class="gold-text text-xs uppercase tracking-widest hover:opacity-70 transition-opacity">Logout</button>
</header>

<main class="px-6 md:px-10 py-12 max-w-screen-xl mx-auto">

    <div class="mb-10 fade-up">
        <p class="gold-text uppercase tracking-[0.35em] text-xs mb-3">Catalog</p>
        <h1 class="text-5xl font-serif">Manage Products</h1>
    </div>

    <div id="productMessage" class="hidden mb-6 rounded-xl px-4 py-3 text-sm"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- ── Form ───────────────────────────────────────── -->
        <form onsubmit="saveAdminProduct(event)" class="glass-card rounded-3xl p-7 h-fit fade-up fade-up-1 transition-all duration-300">
            <h2 id="productFormTitle" class="text-2xl font-serif gold-text mb-6">Add Product</h2>

            <input type="hidden" name="productId" />

            <div class="mb-5">
                <label class="block text-xs uppercase tracking-widest mb-2 text-gray-400">Product Name <span class="text-red-400">*</span></label>
                <input name="name" required placeholder="e.g. Oud Noir"
                       class="input-luxury w-full rounded-xl px-4 py-3 placeholder-gray-600" />
            </div>

            <div class="mb-5">
                <label class="block text-xs uppercase tracking-widest mb-2 text-gray-400">Description</label>
                <textarea name="description" rows="3" placeholder="Describe this fragrance…"
                          class="input-luxury w-full rounded-xl px-4 py-3 placeholder-gray-600 resize-none"></textarea>
            </div>

            <div class="mb-5">
                <label class="block text-xs uppercase tracking-widest mb-2 text-gray-400">Fragrance Family <span class="text-red-400">*</span></label>
                <select name="fragranceFamily" required class="input-luxury w-full rounded-xl px-4 py-3">
                    <option value="">Select Family</option>
                    <option value="FLORAL">🌸 Floral</option>
                    <option value="WOODY">🌲 Woody</option>
                    <option value="ORIENTAL">🌙 Oriental</option>
                    <option value="FRESH">🍃 Fresh</option>
                    <option value="CITRUS">🍋 Citrus</option>
                    <option value="SPICY">🌶 Spicy</option>
                    <option value="AQUATIC">🌊 Aquatic</option>
                    <option value="GOURMAND">🍫 Gourmand</option>
                </select>
            </div>

            <div class="mb-5">
                <label class="block text-xs uppercase tracking-widest mb-2 text-gray-400">Category <span class="text-red-400">*</span></label>
                <select id="productCategorySelect" name="categoryId" required class="input-luxury w-full rounded-xl px-4 py-3">
                    <option value="">Loading categories…</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <div class="relative">
                        <input type="checkbox" name="active" checked class="sr-only peer" />
                        <div class="w-10 h-5 rounded-full border border-yellow-500/30 bg-yellow-500/10 peer-checked:bg-yellow-500/30 peer-checked:border-yellow-500/60 transition-all"></div>
                        <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-gray-400 peer-checked:bg-yellow-400 peer-checked:translate-x-5 transition-all"></div>
                    </div>
                    <span class="text-sm text-gray-300 group-hover:text-white transition-colors">Active product</span>
                </label>
            </div>

            <button type="submit" class="gold-btn w-full rounded-xl py-3 mb-3 font-medium tracking-wide">
                Save Product
            </button>

            <button type="button" onclick="resetProductForm()"
                    class="outline-gold w-full rounded-xl py-3 text-sm">
                Clear Form
            </button>
        </form>

        <!-- ── List ───────────────────────────────────────── -->
        <section class="lg:col-span-2 glass-card rounded-3xl p-7 fade-up fade-up-2">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-serif gold-text">Products</h2>
                <button onclick="loadAdminProducts()"
                        class="outline-gold rounded-xl px-4 py-2 text-sm flex items-center gap-2 hover:bg-yellow-500/5 transition-colors">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Refresh
                </button>
            </div>
            <div id="adminProductsTable" class="space-y-4"></div>
        </section>

    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
<script>
    requireAdminPage();
    loadProductFormData();
    loadAdminProducts();
</script>

</body>

</html>
