<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Products | Perfume Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20">
    <a href="/index.html" class="text-2xl font-serif gold-text">Perfume Store</a>

    <nav class="hidden md:flex gap-8 text-sm uppercase tracking-widest">
        <a href="/index.html" class="hover:text-yellow-400">Home</a>
        <a href="/products.html" class="gold-text">Products</a>
        <a href="/cart.html" class="hover:text-yellow-400">Cart</a>
        <a href="/my-orders.html" class="gold-text">My Orders</a>

    </nav>

    <div id="authLinks" class="text-sm"></div>
</header>

<main class="px-8 py-12">
    <div class="mb-10 flex flex-col md:flex-row md:justify-between md:items-end gap-6">
        <div>
            <p class="gold-text uppercase tracking-[0.3em] text-sm mb-3">Collection</p>
            <h1 class="text-5xl font-serif">All Perfumes</h1>
        </div>

        <div class="flex gap-3">
            <input
                    id="searchInput"
                    type="text"
                    placeholder="Search perfume..."
                    class="input-luxury rounded-xl px-4 py-3"
                    oninput="filterProducts()"
            />

            <select id="familyFilter" class="input-luxury rounded-xl px-4 py-3" onchange="filterProducts()">
                <option value="">All Families</option>
            </select>
        </div>
    </div>

    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
</main>

<!-- products.html -->
<script src="/js/api.js"></script>
<script src="/js/products.js"></script>
<script>
    renderAuthLinks();
    loadProducts();
</script>

</body>
</html>
