<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | Perfume Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        @keyframes fadeUp { from { opacity:0;transform:translateY(16px); } to { opacity:1;transform:translateY(0); } }
        .fade-up { animation: fadeUp .5s ease both; }
        .product-card { transition: transform .3s ease, box-shadow .3s ease; }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(202,138,4,.1); }
        .filter-bar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
        #searchInput, #familyFilter {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(202,138,4,.2);
            color: #fff; border-radius: 12px;
            padding: 11px 18px; font-size: .85rem;
            outline: none; transition: border-color .2s;
        }
        #searchInput:focus, #familyFilter:focus { border-color: rgba(202,138,4,.5); }
        #searchInput::placeholder { color: #4b5563; }
        #familyFilter option { background: #111; }
        .skeleton-card { background: rgba(255,255,255,.03); border:1px solid rgba(202,138,4,.08); border-radius:24px; overflow:hidden; }
        .skeleton-pulse { background:linear-gradient(90deg,rgba(255,255,255,.04)25%,rgba(255,255,255,.08)50%,rgba(255,255,255,.04)75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-black text-white">

<main class="px-6 md:px-12 py-14 max-w-screen-xl mx-auto">
    <div class="mb-12 fade-up">
        <p class="gold-text uppercase tracking-[0.35em] text-xs mb-3">Our Selection</p>
        <h1 class="text-5xl font-serif">All Perfumes</h1>
    </div>
    <div class="filter-bar mb-10 fade-up">
        <input id="searchInput" type="text" placeholder="Search by name or notes…" oninput="filterProducts()" style="min-width:220px;" />
        <select id="familyFilter" onchange="filterProducts()"><option value="">All Fragrance Families</option></select>
        <span id="productCountLabel" style="color:#6b7280;font-size:.8rem;margin-left:auto;"></span>
    </div>
    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        <!-- Skeleton placeholders will be replaced by JS -->
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/load-common.js"></script>
<script src="/js/products.js"></script>
<script>
    renderAuthLinks = renderAuthLinks; // already called by load-common
    loadProducts();
    const _origRenderProducts = renderProducts;
    window.renderProducts = function(products) {
        _origRenderProducts(products);
        const label = document.getElementById('productCountLabel');
        if (label) label.textContent = `${products.length} product${products.length !== 1 ? 's' : ''} found`;
    };
</script>
</body>

</html>
