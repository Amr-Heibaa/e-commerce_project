<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard | Perfume Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20">
    <a href="/index.html" class="text-2xl font-serif gold-text">Perfume Admin</a>

    <nav class="hidden md:flex gap-6 text-sm uppercase tracking-widest">
        <a href="/admin-dashboard.html" class="gold-text">Dashboard</a>
        <a href="/admin-categories.html" class="hover:text-yellow-400">Categories</a>
        <a href="/admin-products.html" class="hover:text-yellow-400">Products</a>
        <a href="/admin-orders.html" class="hover:text-yellow-400">Orders</a>
        <a href="/admin-users.html" class="hover:text-yellow-400">Users</a>
        <a href="/admin-refunds.html" class="hover:text-yellow-400">Refunds</a>
    </nav>

    <button onclick="api.logout()" class="gold-text text-sm">Logout</button>
</header>

<main class="px-8 py-12">
    <div class="mb-10">
        <p class="gold-text uppercase tracking-[0.3em] text-sm mb-3">Control Center</p>
        <h1 class="text-5xl font-serif">Admin Dashboard</h1>
    </div>

    <section id="dashboardCards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
        <div class="glass-card rounded-3xl p-6">
            <p class="text-gray-400 text-sm mb-2">Products</p>
            <h2 id="productCount" class="text-4xl font-serif gold-text">0</h2>
        </div>

        <div class="glass-card rounded-3xl p-6">
            <p class="text-gray-400 text-sm mb-2">Categories</p>
            <h2 id="categoryCount" class="text-4xl font-serif gold-text">0</h2>
        </div>

        <div class="glass-card rounded-3xl p-6">
            <p class="text-gray-400 text-sm mb-2">Orders</p>
            <h2 id="orderCount" class="text-4xl font-serif gold-text">0</h2>
        </div>

        <div class="glass-card rounded-3xl p-6">
            <p class="text-gray-400 text-sm mb-2">Refunds</p>
            <h2 id="refundCount" class="text-4xl font-serif gold-text">0</h2>
        </div>
    </section>

    <section class="glass-card rounded-3xl p-6">
        <h2 class="text-2xl font-serif gold-text mb-6">Quick Actions</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <a href="/admin-categories.html" class="outline-gold rounded-xl px-5 py-4 text-center">Manage Categories</a>
            <a href="/admin-products.html" class="outline-gold rounded-xl px-5 py-4 text-center">Manage Products</a>
            <a href="/admin-orders.html" class="outline-gold rounded-xl px-5 py-4 text-center">Manage Orders</a>
            <a href="/admin-users.html" class="outline-gold rounded-xl px-5 py-4 text-center">Manage Users</a>
            <a href="/admin-refunds.html" class="outline-gold rounded-xl px-5 py-4 text-center">Manage Refunds</a>
            <a href="/index.html" class="outline-gold rounded-xl px-5 py-4 text-center">View Store</a>
        </div>
    </section>
</main>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
<script>
    requireAdminPage();
    loadAdminDashboard();
</script>

</body>
</html>
