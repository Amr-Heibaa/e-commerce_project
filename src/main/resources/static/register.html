<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Perfume Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
        @keyframes slideUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0 !important;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 70% 25%, rgba(202,138,4,.07) 0%, transparent 55%),
                radial-gradient(ellipse at 25% 75%, rgba(202,138,4,.05) 0%, transparent 50%);
            pointer-events: none;
            animation: fadeIn 1.2s ease both;
        }

        .close-btn {
            position: fixed;
            top: 20px; right: 24px;
            z-index: 100;
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(202,138,4,.3);
            background: rgba(10,10,10,.8);
            backdrop-filter: blur(8px);
            color: #9ca3af;
            font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: border-color .2s, color .2s, background .2s, transform .2s;
            cursor: pointer;
        }
        .close-btn:hover {
            border-color: rgba(202,138,4,.7);
            color: #ca8a04;
            background: rgba(202,138,4,.08);
            transform: scale(1.08);
        }

        .auth-card {
            position: relative;
            width: 100%;
            max-width: 400px;               /* smaller */
            background: rgba(18,18,18,.92);
            border: 1px solid rgba(202,138,4,.18);
            border-radius: 24px;
            padding: 38px 36px;             /* reduced padding */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(202,138,4,.05);
            animation: slideUp .55s cubic-bezier(.22,1,.36,1) both;
            margin: 16px;
        }

        .auth-input {
            width: 100%;
            background: rgba(0,0,0,.5);
            border: 1px solid rgba(202,138,4,.18);
            border-radius: 10px;
            padding: 12px 16px;             /* smaller */
            color: #fff;
            font-size: 0.85rem;             /* smaller */
            outline: none;
            transition: border-color .2s, background .2s;
            box-sizing: border-box;
        }
        .auth-input:focus {
            border-color: rgba(202,138,4,.6);
            background: rgba(202,138,4,.04);
        }
        .auth-input::placeholder { color: #2d2d2d; }
        .auth-input.err { border-color: rgba(248,113,113,.5); }

        .auth-label {
            display: block;
            font-size: 0.65rem;            /* smaller */
            text-transform: uppercase;
            letter-spacing: .16em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .field-hint {
            font-size: 0.62rem;
            color: #f87171;
            margin-top: 4px;
            display: none;
        }
        .field-hint.show { display: block; }

        .auth-btn {
            width: 100%;
            padding: 13px;                 /* smaller */
            background: linear-gradient(135deg, #d4a017 0%, #b8860b 55%, #ca8a04 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: .12em;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(202,138,4,.25);
            transition: opacity .2s, transform .15s, box-shadow .2s;
            margin-top: 6px;
        }
        .auth-btn:hover  { opacity:.9; transform:translateY(-1px); box-shadow:0 8px 28px rgba(202,138,4,.35); }
        .auth-btn:active { transform:translateY(0); }
        .auth-btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }

        .strength-bar {
            display: flex; gap: 4px; margin-top: 8px;
        }
        .strength-seg {
            flex: 1; height: 2px; border-radius: 2px;
            background: rgba(255,255,255,.08);
            transition: background .3s;
        }
        .strength-label {
            font-size: 0.62rem; margin-top: 4px; color: #4b5563;
            transition: color .3s;
        }

        .gold-divider {
            width: 32px; height: 1px;
            background: linear-gradient(90deg, transparent, #ca8a04, transparent);
            margin: 0 auto 18px;
        }

        /* Reduce heading sizes */
        .auth-card h1 {
            font-size: 1.5rem;             /* smaller */
            margin-bottom: 6px;
        }

        .auth-card .subhead {
            font-size: 0.8rem;
            color: #4b5563;
        }
    </style>
</head>
<body>

<a href="/index.html" class="close-btn" title="Back to store" aria-label="Close and return to store">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
</a>

<div class="auth-card">

    <div style="text-align:center;margin-bottom:28px;">
        <a href="/index.html"
           style="font-family:serif;font-size:1.5rem;color:#ca8a04;text-decoration:none;
                      letter-spacing:.04em;display:inline-block;margin-bottom:10px;">
            Perfume Store
        </a>
        <div class="gold-divider"></div>
        <h1>Create Account</h1>
        <p class="subhead">Join the luxury fragrance experience</p>
    </div>

    <div id="errorBox"
         class="hidden mb-4 rounded-xl px-3 py-2 text-sm"
         style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#fca5a5;">
    </div>

    <form onsubmit="register(event)" style="display:flex;flex-direction:column;gap:18px;">

        <!-- First + Last name -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div>
                <label class="auth-label">First Name</label>
                <input name="firstName" type="text" required placeholder="John" class="auth-input"
                       id="firstName" oninput="clearErr('firstName','errFirstName')" />
                <p class="field-hint" id="errFirstName">Required.</p>
            </div>
            <div>
                <label class="auth-label">Last Name</label>
                <input name="lastName" type="text" required placeholder="Doe" class="auth-input"
                       id="lastName" oninput="clearErr('lastName','errLastName')" />
                <p class="field-hint" id="errLastName">Required.</p>
            </div>
        </div>

        <!-- Email -->
        <div>
            <label class="auth-label">Email</label>
            <input name="email" type="email" required placeholder="you@example.com" class="auth-input"
                   id="regEmail" oninput="clearErr('regEmail','errEmail')" />
            <p class="field-hint" id="errEmail">Enter a valid email address.</p>
        </div>

        <!-- Password -->
        <div>
            <label class="auth-label">Password</label>
            <div style="position:relative;">
                <input name="password" type="password" required placeholder="Min. 8 characters" class="auth-input"
                       id="regPassword" minlength="8" oninput="onPasswordInput(this)" />
                <button type="button" onclick="togglePwd('regPassword')"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                   background:none;border:none;cursor:pointer;color:#4b5563;
                                   font-size:0.8rem;padding:0;transition:color .2s;"
                        onmouseover="this.style.color='#ca8a04'"
                        onmouseout="this.style.color='#4b5563'">👁</button>
            </div>
            <div class="strength-bar" id="strengthBar">
                <div class="strength-seg" id="seg1"></div>
                <div class="strength-seg" id="seg2"></div>
                <div class="strength-seg" id="seg3"></div>
                <div class="strength-seg" id="seg4"></div>
            </div>
            <p class="strength-label" id="strengthLabel"></p>
            <p class="field-hint" id="errPassword">Password must be at least 8 characters.</p>
        </div>

        <!-- Confirm Password -->
        <div>
            <label class="auth-label">Confirm Password</label>
            <div style="position:relative;">
                <input type="password" required placeholder="Repeat password" class="auth-input"
                       id="confirmPassword" oninput="onConfirmInput(this)" />
                <button type="button" onclick="togglePwd('confirmPassword')"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                   background:none;border:none;cursor:pointer;color:#4b5563;
                                   font-size:0.8rem;padding:0;transition:color .2s;"
                        onmouseover="this.style.color='#ca8a04'"
                        onmouseout="this.style.color='#4b5563'">👁</button>
            </div>
            <p class="field-hint" id="errConfirm">Passwords do not match.</p>
        </div>

        <button type="submit" class="auth-btn" id="registerBtn">Register</button>

    </form>

    <p style="text-align:center;font-size:0.8rem;color:#374151;margin-top:22px;">
        Already have an account?
        <a href="/login.html"
           style="color:#ca8a04;text-decoration:none;margin-left:4px;transition:opacity .2s;"
           onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'">
            Login
        </a>
    </p>

</div>

<script src="/js/api.js"></script>
<script>
    if (api.isLoggedIn()) {
        window.location.href = '/index.html';
    }

    function togglePwd(id) {
        const inp = document.getElementById(id);
        inp.type  = inp.type === 'password' ? 'text' : 'password';
    }

    function clearErr(inputId, errId) {
        document.getElementById(inputId)?.classList.remove('err');
        document.getElementById(errId)?.classList.remove('show');
    }

    function onPasswordInput(el) {
        clearErr('regPassword', 'errPassword');
        const v = el.value;
        let score = 0;
        if (v.length >= 8) score++;
        if (/[A-Z]/.test(v)) score++;
        if (/[0-9]/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;

        const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
        const labels = ['Weak','Fair','Good','Strong'];
        const segs = ['seg1','seg2','seg3','seg4'];

        segs.forEach((id, i) => {
            const seg = document.getElementById(id);
            seg.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,.08)';
        });

        const lbl = document.getElementById('strengthLabel');
        if (v.length === 0) {
            lbl.textContent = '';
            lbl.style.color = '#4b5563';
        } else {
            lbl.textContent = labels[score - 1] || 'Weak';
            lbl.style.color = colors[score - 1] || '#ef4444';
        }

        const confirm = document.getElementById('confirmPassword');
        if (confirm.value) onConfirmInput(confirm);
    }

    function onConfirmInput(el) {
        const pwd = document.getElementById('regPassword').value;
        const ok = el.value === pwd;
        el.classList.toggle('err', !ok && el.value.length > 0);
        document.getElementById('errConfirm').classList.toggle('show', !ok && el.value.length > 0);
    }

    async function register(event) {
        event.preventDefault();
        const form = event.target;
        const errorBox = document.getElementById('errorBox');
        const btn = document.getElementById('registerBtn');

        let valid = true;

        if (!form.firstName.value.trim()) {
            document.getElementById('firstName').classList.add('err');
            document.getElementById('errFirstName').classList.add('show');
            valid = false;
        }
        if (!form.lastName.value.trim()) {
            document.getElementById('lastName').classList.add('err');
            document.getElementById('errLastName').classList.add('show');
            valid = false;
        }
        if (!form.email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email.value)) {
            document.getElementById('regEmail').classList.add('err');
            document.getElementById('errEmail').classList.add('show');
            valid = false;
        }
        if (form.password.value.length < 8) {
            document.getElementById('regPassword').classList.add('err');
            document.getElementById('errPassword').classList.add('show');
            valid = false;
        }
        const confirm = document.getElementById('confirmPassword');
        if (confirm.value !== form.password.value) {
            confirm.classList.add('err');
            document.getElementById('errConfirm').classList.add('show');
            valid = false;
        }

        if (!valid) return;

        btn.disabled = true;
        btn.textContent = 'Creating account…';
        errorBox.classList.add('hidden');

        try {
            await api.post('/auth/register', {
                firstName: form.firstName.value.trim(),
                lastName: form.lastName.value.trim(),
                email: form.email.value.trim(),
                password: form.password.value
            });
            window.location.href = '/login.html';
        } catch (err) {
            errorBox.textContent = err.message;
            errorBox.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Register';
        }
    }
</script>

</body>
</html>
