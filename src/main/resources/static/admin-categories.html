<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Categories | Essentiel </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp .45s ease both; }
        .fade-up-1 { animation-delay: .05s; }
        .fade-up-2 { animation-delay: .12s; }
    </style>
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20 sticky top-0 z-50 backdrop-blur-md bg-black/80">
    <a href="/admin-dashboard.html" class="text-2xl font-serif gold-text tracking-wide">Perfume Admin</a>

    <nav class="hidden md:flex gap-6 text-xs uppercase tracking-widest">
        <a href="/admin-dashboard.html" class="hover:text-yellow-400 transition-colors">Dashboard</a>
        <a href="/admin-categories.html" class="gold-text border-b border-yellow-500 pb-0.5">Categories</a>
        <a href="/admin-products.html"   class="hover:text-yellow-400 transition-colors">Products</a>
        <a href="/admin-orders.html"     class="hover:text-yellow-400 transition-colors">Orders</a>
        <a href="/admin-users.html"      class="hover:text-yellow-400 transition-colors">Users</a>
        <a href="/admin-refunds.html"    class="hover:text-yellow-400 transition-colors">Refunds</a>
    </nav>

    <button onclick="logout()" class="gold-text text-xs uppercase tracking-widest hover:opacity-70 transition-opacity">Logout</button>
</header>

<main class="px-6 md:px-10 py-12 max-w-screen-xl mx-auto">

    <div class="mb-10 fade-up">
        <p class="gold-text uppercase tracking-[0.35em] text-xs mb-3">Catalog</p>
        <h1 class="text-5xl font-serif">Manage Categories</h1>
    </div>

    <div id="categoryMessage" class="hidden mb-6 rounded-xl px-4 py-3 text-sm"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- ── Form ───────────────────────────────────────── -->
        <form onsubmit="saveCategory(event)" class="glass-card rounded-3xl p-7 h-fit fade-up fade-up-1 transition-all duration-300">
            <h2 id="categoryFormTitle" class="text-2xl font-serif gold-text mb-6">Add Category</h2>

            <input type="hidden" name="categoryId" />

            <div class="mb-5">
                <label class="block text-xs uppercase tracking-widest mb-2 text-gray-400">Category Name <span class="text-red-400">*</span></label>
                <input name="name" required placeholder="e.g. Oriental"
                       class="input-luxury w-full rounded-xl px-4 py-3 placeholder-gray-600" />
            </div>

            <div class="mb-6">
                <label class="block text-xs uppercase tracking-widest mb-2 text-gray-400">Description</label>
                <textarea name="description" rows="4" placeholder="Brief description of this category…"
                          class="input-luxury w-full rounded-xl px-4 py-3 placeholder-gray-600 resize-none"></textarea>
            </div>

            <button type="submit" class="gold-btn w-full rounded-xl py-3 mb-3 font-medium tracking-wide">
                Save Category
            </button>

            <button type="button" onclick="resetCategoryForm()"
                    class="outline-gold w-full rounded-xl py-3 text-sm">
                Clear Form
            </button>
        </form>

        <!-- ── List ───────────────────────────────────────── -->
        <section class="lg:col-span-2 glass-card rounded-3xl p-7 fade-up fade-up-2">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-serif gold-text">Categories</h2>
                <button onclick="loadCategories()"
                        class="outline-gold rounded-xl px-4 py-2 text-sm flex items-center gap-2 hover:bg-yellow-500/5 transition-colors">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Refresh
                </button>
            </div>
            <div id="categoriesTable" class="space-y-4"></div>
        </section>

    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
<script>
    requireAdminPage();
    loadCategories();

    // Auto-filter status on change
    document.getElementById('orderStatusFilter')?.addEventListener('change', loadAdminOrders);
</script>

</body>

</html>
