<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Refunds | Essentiel </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp .45s ease both; }
    </style>
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20 sticky top-0 z-50 backdrop-blur-md bg-black/80">
    <a href="/admin-dashboard.html" class="text-2xl font-serif gold-text tracking-wide">Perfume Admin</a>

    <nav class="hidden md:flex gap-6 text-xs uppercase tracking-widest">
        <a href="/admin-dashboard.html" class="hover:text-yellow-400 transition-colors">Dashboard</a>
        <a href="/admin-categories.html" class="hover:text-yellow-400 transition-colors">Categories</a>
        <a href="/admin-products.html"   class="hover:text-yellow-400 transition-colors">Products</a>
        <a href="/admin-orders.html"     class="hover:text-yellow-400 transition-colors">Orders</a>
        <a href="/admin-users.html"      class="hover:text-yellow-400 transition-colors">Users</a>
        <a href="/admin-refunds.html"    class="gold-text border-b border-yellow-500 pb-0.5">Refunds</a>
    </nav>

    <button onclick="logout()" class="gold-text text-xs uppercase tracking-widest hover:opacity-70 transition-opacity">Logout</button>
</header>

<main class="px-6 md:px-10 py-12 max-w-screen-xl mx-auto">

    <div class="mb-10 fade-up">
        <p class="gold-text uppercase tracking-[0.35em] text-xs mb-3">Support</p>
        <h1 class="text-5xl font-serif">Manage Refund Requests</h1>
    </div>

    <div id="refundMessage" class="hidden mb-6 rounded-xl px-4 py-3 text-sm"></div>

    <section class="glass-card rounded-3xl p-7 fade-up">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-serif gold-text">Refund Requests</h2>
                <p class="text-gray-500 text-xs mt-1">Pending requests are shown first.</p>
            </div>
            <button onclick="loadAdminRefunds()"
                    class="outline-gold rounded-xl px-4 py-2 text-sm flex items-center gap-2 hover:bg-yellow-500/5 transition-colors">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                Refresh
            </button>
        </div>
        <div id="adminRefundsTable" class="space-y-4"></div>
    </section>

</main>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
<script>
    requireAdminPage();
    loadAdminRefunds();
</script>

</body>

</html>
