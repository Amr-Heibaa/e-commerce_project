<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Product Details | Perfume Store</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

<!-- ================= HEADER ================= -->

<header class="sticky top-0 z-50 bg-black/90 backdrop-blur border-b border-yellow-500/20">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

        <!-- Logo -->
        <a href="/index.html"
           class="text-2xl md:text-3xl font-serif gold-text tracking-wide">
            Perfume Store
        </a>

        <!-- Navigation -->
        <nav class="hidden md:flex gap-8 text-sm uppercase tracking-[0.2em]">
            <a href="/index.html" class="hover:text-yellow-400 transition">
                Home
            </a>

            <a href="/products.html" class="gold-text font-semibold">
                Products
            </a>

            <a href="/cart.html" class="hover:text-yellow-400 transition">
                Cart
            </a>

            <a href="/my-orders.html" class="hover:text-yellow-400 transition">
                My Orders
            </a>
        </nav>

        <!-- Auth -->
        <div id="authLinks" class="text-sm flex items-center gap-4"></div>

    </div>
</header>

<!-- ================= PRODUCT DETAILS ================= -->

<main class="flex-1">

    <!-- Product Section -->
    <section id="productDetails"
             class="max-w-7xl mx-auto px-6 py-14">
    </section>

    <!-- ================= REVIEWS ================= -->

    <section class="max-w-7xl mx-auto px-6 pb-20">

        <div class="flex items-center justify-between mb-8">
            <div>
                <p class="gold-text uppercase tracking-[0.3em] text-xs mb-2">
                    Customer Feedback
                </p>

                <h2 class="text-4xl font-serif">
                    Reviews
                </h2>
            </div>

            <button
                    onclick="document.getElementById('review-modal').classList.add('show')"
                    class="gold-btn rounded-xl px-6 py-3">
                Write Review
            </button>
        </div>

        <!-- Reviews List -->
        <div id="reviews-list" class="space-y-6">
            <div class="glass-card rounded-3xl p-8 text-center">
                <p class="text-gray-400">Loading reviews...</p>
            </div>
        </div>

    </section>

</main>

<!-- ================= REVIEW MODAL ================= -->

<div id="review-modal"
     class="fixed inset-0 bg-black/70 backdrop-blur hidden items-center justify-center z-50 p-4">

    <div class="glass-card rounded-3xl p-8 w-full max-w-xl relative">

        <!-- Close -->
        <button onclick="closeReviewModal()"
                class="absolute top-5 right-5 text-gray-400 hover:text-white text-xl">
            ✕
        </button>

        <div class="mb-8">
            <p class="gold-text uppercase tracking-[0.3em] text-xs mb-2">
                Share Your Experience
            </p>

            <h3 class="text-3xl font-serif">
                Add Review
            </h3>
        </div>

        <!-- Rating -->
        <div class="mb-6">
            <label class="block mb-3 text-sm text-gray-300">
                Rating
            </label>

            <div id="rating-stars" class="flex gap-2"></div>

            <input type="hidden" id="rating-value" value="0">
        </div>

        <!-- Comment -->
        <div class="mb-6">
            <label class="block mb-3 text-sm text-gray-300">
                Comment
            </label>

            <textarea
                    id="review-comment"
                    rows="5"
                    class="input-luxury w-full rounded-2xl px-4 py-3 resize-none"
                    placeholder="Write your thoughts about this perfume..."></textarea>
        </div>

        <!-- Submit -->
        <button
                id="submit-review-btn"
                onclick="submitReview()"
                class="gold-btn rounded-xl px-6 py-3 w-full">
            Submit Review
        </button>

    </div>
</div>

<!-- ================= FOOTER ================= -->

<footer class="border-t border-yellow-500/10 py-6 text-center text-gray-500 text-sm">
    © 2026 Perfume Store. All rights reserved.
</footer>

<!-- ================= STYLES ================= -->

<style>

    #review-modal.show {
        display: flex;
    }

</style>

<!-- ================= SCRIPTS ================= -->

<script src="/js/api.js"></script>
<script src="/js/products.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/reviews.js"></script>

<!-- product-details.html -->
<script src="/js/api.js"></script>
<script src="/js/products.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/orders.js"></script>
<script src="/js/reviews.js"></script>
<script>
    renderAuthLinks();
    loadProductDetails();

    const productId = new URLSearchParams(window.location.search).get('id');

    if (productId) {
        loadReviews(productId);
    }

    initRatingStars();
</script>

</body>
</html>
