<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Cart | Perfume Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-black text-white">

<header class="navbar px-8 py-4 flex justify-between items-center border-b border-yellow-500/20">
    <a href="/index.html" class="text-2xl font-serif gold-text">Perfume Store</a>

    <nav class="hidden md:flex gap-8 text-sm uppercase tracking-widest">
        <a href="/index.html" class="hover:text-yellow-400">Home</a>
        <a href="/products.html" class="hover:text-yellow-400">Products</a>
        <a href="/cart.html" class="gold-text">Cart</a>
        <a href="/my-orders.html" class="gold-text">My Orders</a>

    </nav>

    <div id="authLinks" class="text-sm"></div>
</header>

<main class="px-8 py-12">
    <div class="mb-10">
        <p class="gold-text uppercase tracking-[0.3em] text-sm mb-3">Shopping Bag</p>
        <h1 class="text-5xl font-serif">Your Cart</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section class="lg:col-span-2">
            <div id="cartItems" class="space-y-5"></div>
        </section>

        <aside class="glass-card rounded-3xl p-6 h-fit">
            <h2 class="text-2xl font-serif gold-text mb-6">Order Summary</h2>

            <div class="flex justify-between text-gray-300 mb-3">
                <span>Subtotal</span>
                <span id="cartSubtotal">$0.00</span>
            </div>

            <div class="flex justify-between text-gray-300 mb-3">
                <span>Shipping</span>
                <span>Free</span>
            </div>

            <div class="border-t border-yellow-500/20 my-5"></div>

            <div class="flex justify-between text-xl font-semibold mb-6">
                <span>Total</span>
                <span class="gold-text" id="cartTotal">$0.00</span>
            </div>

            <a href="/checkout.html" class="gold-btn block text-center rounded-xl py-3">
                Proceed To Checkout
            </a>
        </aside>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/products.js"></script>
<script src="/js/cart.js"></script>
<script>
    requireCartAuth();
    renderAuthLinks();
    loadCart();
</script>

</body>
</html>
